spring:
  application:
    name: order-service
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderservice}
    username: ${DATASOURCE_USERNAME:orderservice}
    password: ${DATASOURCE_PASSWORD:orderservice}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:orderservice}
    password: ${RABBITMQ_PASSWORD:orderservice}

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
