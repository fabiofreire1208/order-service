services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderservice
      POSTGRES_USER: orderservice
      POSTGRES_PASSWORD: orderservice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U orderservice" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: orderservice
      RABBITMQ_DEFAULT_PASS: orderservice
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderservice
      DATASOURCE_USERNAME: orderservice
      DATASOURCE_PASSWORD: orderservice
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: orderservice
      RABBITMQ_PASSWORD: orderservice
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
